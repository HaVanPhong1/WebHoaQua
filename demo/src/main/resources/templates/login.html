<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Đăng nhập FruitShop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" th:href="@{/css/shop.css}" />
</head>
<body class="shop-login-body">
<div class="card shop-login-panel">
    <div class="mb-4 text-center">
        <div class="shop-login-brand">FruitShop</div>
        <p>Đăng nhập để mua trái cây tươi, quản lý đơn hàng và nhận ưu đãi.</p>
    </div>

    <!-- Alert Messages -->
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${param.logout}" class="alert alert-info">Đã đăng xuất thành công.</div>
    <div th:if="${param.error}" class="alert alert-danger">Tên đăng nhập hoặc mật khẩu không chính xác.</div>

    <form method="post" th:action="@{/login}" class="shop-login-form">
        <div class="mb-3">
            <label class="form-label">Tên đăng nhập</label>
            <input class="form-control" type="text" name="username" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Mật khẩu</label>
            <input class="form-control" type="password" name="password" required />
        </div>
        <button class="btn btn-success w-100" type="submit">Đăng nhập</button>
    </form>
    <div class="mt-4 text-center text-muted small">Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a>.</div>
</div>
</body>
</html>
