<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: adminLayout('Tài khoản - Thêm / Sửa')">
    <section>
        <div class="page-actions">
            <a class="btn btn-secondary" th:href="@{/admin/accounts}">Quay lại tài khoản</a>
        </div>
        <div class="card p-4 page-section">
            <form th:action="@{/admin/accounts/save}" th:object="${account}" method="post">
                <input type="hidden" th:field="*{id}" />
                <div class="row gx-4">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Tên đăng nhập</label>
                        <input class="form-control" th:field="*{username}" required />
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email</label>
                        <input class="form-control" type="email" th:field="*{email}" required />
                    </div>
                </div>
                <div class="row gx-4">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Mật khẩu</label>
                        <input class="form-control" type="password" th:field="*{password}" placeholder="Để trống nếu không đổi" />
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Vai trò</label>
                        <select class="form-select" th:field="*{role}">
                            <option th:each="role : ${roles}" th:value="${role}" th:text="${role}"></option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Họ tên</label>
                    <input class="form-control" th:field="*{fullName}" />
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" th:field="*{active}" />
                    <label class="form-check-label">Kích hoạt</label>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-success" type="submit">Lưu</button>
                    <a class="btn btn-outline-secondary" th:href="@{/admin/accounts}">Hủy</a>
                </div>
            </form>
        </div>
    </section>
</html>
