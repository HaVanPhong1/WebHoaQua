<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: adminLayout('Sản phẩm - Thêm / Sửa')">
    <section>
        <div class="page-actions">
            <a class="btn btn-secondary" th:href="@{/admin/products}">Quay lại sản phẩm</a>
        </div>
        <div class="card p-4 page-section">
            <form th:action="@{/admin/products/save}" th:object="${product}" method="post">
                <input type="hidden" th:field="*{id}" />
                <div class="row gx-4">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Tên</label>
                        <input class="form-control" th:field="*{name}" required />
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Danh mục</label>
                        <select class="form-select" name="categoryId">
                            <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}" th:selected="${product.category != null} ? ${category.id} == ${product.category.id} : false"></option>
                        </select>
                    </div>
                </div>
                <div class="row gx-4">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Giá</label>
                        <input class="form-control" type="number" step="0.01" th:field="*{price}" required />
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Tồn kho</label>
                        <input class="form-control" type="number" th:field="*{stock}" />
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Ảnh</label>
                        <input class="form-control" th:field="*{image}" />
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Mô tả</label>
                    <textarea class="form-control" th:field="*{description}" rows="4"></textarea>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-success" type="submit">Lưu</button>
                    <a class="btn btn-outline-secondary" th:href="@{/admin/products}">Hủy</a>
                </div>
            </form>
        </div>
    </section>
</html>
