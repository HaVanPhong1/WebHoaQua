<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: adminLayout('Promotion Form')">
    <section>
        <form th:action="@{/admin/promotions/save}" th:object="${promotion}" method="post" class="row g-3" id="promotionForm">
            <input type="hidden" th:field="*{id}" />
            <div class="col-12">
                <div class="card p-3 mb-3">
                    <div class="row g-2">
                        <div class="col-md-6">
                            <label class="form-label">Tên khuyến mãi</label>
                            <input class="form-control" th:field="*{name}" placeholder="Ví dụ: Khuyến mãi Tết 2026" />
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Loại khuyến mãi</label>
                            <select class="form-select" th:field="*{type}" id="promoType">
                                <option value="bulk">Giảm theo đơn giá (mua đến X đồng)</option>
                                <option value="holiday">Giảm dịp lễ (ngày lặp hoặc trong khoảng)</option>
                            </select>
                            <div class="form-text">Chọn loại để hiển thị các trường phù hợp.</div>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Phần trăm (%)</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{discountPercent}" id="discountPercent" placeholder="Nhập 10 cho 10% hoặc 0.10" />
                            <div class="form-text">Nhập 10 cho 10% hoặc 0.10 cho 10%.</div>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Ngưỡng tối thiểu (VNĐ)</label>
                            <input type="number" step="1" class="form-control" th:field="*{threshold}" id="threshold" placeholder="Ví dụ: 300000" />
                            <div class="form-text">Áp dụng khi tổng đơn >= ngưỡng.</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <label class="form-label">Ngày bắt đầu</label>
                <input type="date" class="form-control" name="startDate" th:value="${promotion.startDate}" />
            </div>
            <div class="col-md-4">
                <label class="form-label">Ngày kết thúc</label>
                <input type="date" class="form-control" name="endDate" th:value="${promotion.endDate}" />
            </div>
            <div class="col-md-3" id="recurringGroup">
                <label class="form-label">Tháng lặp (nếu có)</label>
                <input type="number" class="form-control" th:field="*{recurringMonth}" id="recurringMonth" placeholder="1-12" />
            </div>
            <div class="col-md-3" id="recurringDayGroup">
                <label class="form-label">Ngày lặp (nếu có)</label>
                <input type="number" class="form-control" th:field="*{recurringDay}" id="recurringDay" placeholder="1-31" />
            </div>

            <div class="col-12 mt-3">
                <label class="form-check-label me-2">
                    <input type="checkbox" th:field="*{active}" /> Kích hoạt
                </label>
                <button class="btn btn-primary ms-3" type="submit">Lưu</button>
                <a class="btn btn-secondary ms-2" th:href="@{/admin/promotions}">Hủy</a>
            </div>
        </form>
    </section>

    <style>
        .highlight-required { box-shadow: 0 0 0 3px rgba(0,123,255,0.12); }
        .hidden { display: none; }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const typeEl = document.getElementById('promoType');
            const thresholdGroup = document.getElementById('thresholdGroup');
            const thresholdInput = document.getElementById('threshold');
            const discountInput = document.getElementById('discountPercent');
            const recurringGroup = document.getElementById('recurringGroup');
            const recurringDayGroup = document.getElementById('recurringDayGroup');
            const recurringMonth = document.getElementById('recurringMonth');
            const recurringDay = document.getElementById('recurringDay');

            function updateVisibility() {
                const val = typeEl.value;
                // reset
                if (thresholdGroup) thresholdGroup.classList.add('hidden');
                if (recurringGroup) recurringGroup.classList.add('hidden');
                if (recurringDayGroup) recurringDayGroup.classList.add('hidden');
                if (thresholdInput) thresholdInput.required = false;
                if (recurringMonth) recurringMonth.required = false;
                if (recurringDay) recurringDay.required = false;
                if (discountInput) discountInput.required = false;
                if (thresholdGroup) thresholdGroup.classList.remove('highlight-required');
                if (recurringGroup) recurringGroup.classList.remove('highlight-required');
                if (recurringDayGroup) recurringDayGroup.classList.remove('highlight-required');
                if (discountInput) discountInput.classList.remove('highlight-required');

                if (val === 'bulk') {
                    if (thresholdGroup) thresholdGroup.classList.remove('hidden');
                    if (thresholdInput) thresholdInput.required = true;
                    if (discountInput) discountInput.required = true;
                    if (thresholdGroup) thresholdGroup.classList.add('highlight-required');
                    if (discountInput) discountInput.classList.add('highlight-required');
                } else if (val === 'holiday') {
                    if (recurringGroup) recurringGroup.classList.remove('hidden');
                    if (recurringDayGroup) recurringDayGroup.classList.remove('hidden');
                    if (recurringMonth) recurringMonth.required = true;
                    if (recurringDay) recurringDay.required = true;
                    if (discountInput) discountInput.required = true;
                    if (recurringGroup) recurringGroup.classList.add('highlight-required');
                    if (recurringDayGroup) recurringDayGroup.classList.add('highlight-required');
                    if (discountInput) discountInput.classList.add('highlight-required');
                }
            }

            typeEl.addEventListener('change', function () {
                updateVisibility();
            });
            updateVisibility();
        });
    </script>
</html>
