<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: adminLayout('Danh mục')">
    <section>
        <div class="page-actions mb-3">
            <a class="btn btn-primary" th:href="@{/admin/categories/new}">Thêm danh mục</a>
        </div>

        <!-- Thông báo thành công / lỗi -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-3" role="alert" style="border-radius: 8px;">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show mb-3" role="alert" style="border-radius: 8px;">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="table-responsive page-section">
            <table class="table table-bordered table-hover align-middle">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Tên</th>
                    <th>Mô tả</th>
                    <th class="text-center">Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="category : ${categories}">
                    <td th:text="${category.id}"></td>
                    <td th:text="${category.name}"></td>
                    <td th:text="${category.description}"></td>
                    <td class="text-center">
                        <a class="btn btn-sm btn-warning me-1" th:href="@{/admin/categories/edit/{id}(id=${category.id})}">Sửa</a>
                        <a class="btn btn-sm btn-danger btn-delete" th:href="@{/admin/categories/delete/{id}(id=${category.id})}" th:data-name="${category.name}">Xóa</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', function() {
                document.querySelectorAll('.btn-delete').forEach(function(btn) {
                    btn.addEventListener('click', function(e) {
                        var name = this.getAttribute('data-name') || 'mục này';
                        if (!confirm('Bạn có chắc chắn muốn xóa "' + name + '" không?\n\nHành động này không thể hoàn tác!')) {
                            e.preventDefault();
                        }
                    });
                });
            });
        </script>
    </section>
</html>
