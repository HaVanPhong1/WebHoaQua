<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: adminLayout('Danh mục')">
    <section>
        <div class="page-actions">
            <a class="btn btn-primary" th:href="@{/admin/categories/new}">Thêm danh mục</a>
        </div>
        <div class="table-responsive page-section">
            <table class="table table-bordered table-hover align-middle">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Tên</th>
                    <th>Mô tả</th>
                    <th class="text-center">Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="category : ${categories}">
                    <td th:text="${category.id}"></td>
                    <td th:text="${category.name}"></td>
                    <td th:text="${category.description}"></td>
                    <td class="text-center">
                        <a class="btn btn-sm btn-warning me-1" th:href="@{/admin/categories/edit/{id}(id=${category.id})}">Sửa</a>
                        <a class="btn btn-sm btn-danger" th:href="@{/admin/categories/delete/{id}(id=${category.id})}">Xóa</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</div>
</body>
</html>
