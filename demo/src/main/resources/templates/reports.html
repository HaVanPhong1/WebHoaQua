<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: adminLayout('Báo cáo thống kê')">
    <section>
        <!-- Thêm Chart.js -->
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        
        <!-- Cards -->
        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm h-100" style="border-radius: 16px; background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white;">
                    <div class="card-body p-4 d-flex align-items-center justify-content-between">
                        <div>
                            <h6 class="text-uppercase fw-bold opacity-75 mb-1">Doanh thu 30 ngày</h6>
                            <h2 class="fw-bold mb-0" th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT')} + '₫'">0₫</h2>
                        </div>
                        <div class="fs-1 opacity-50"><i class="bi bi-wallet2"></i></div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm h-100" style="border-radius: 16px; background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white;">
                    <div class="card-body p-4 d-flex align-items-center justify-content-between">
                        <div>
                            <h6 class="text-uppercase fw-bold opacity-75 mb-1">Đơn hàng 30 ngày</h6>
                            <h2 class="fw-bold mb-0" th:text="${orderCount}">0</h2>
                        </div>
                        <div class="fs-1 opacity-50"><i class="bi bi-cart-check"></i></div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm h-100" style="border-radius: 16px; background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: white;">
                    <div class="card-body p-4 d-flex align-items-center justify-content-between">
                        <div>
                            <h6 class="text-uppercase fw-bold opacity-75 mb-1">Tổng Khách hàng</h6>
                            <h2 class="fw-bold mb-0" th:text="${customerCount}">0</h2>
                        </div>
                        <div class="fs-1 opacity-50"><i class="bi bi-people"></i></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts -->
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm h-100" style="border-radius: 16px;">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4 text-dark"><i class="bi bi-graph-up-arrow text-success"></i> Biểu đồ doanh thu 7 ngày gần nhất</h5>
                        <canvas id="revenueChart" height="120"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm h-100" style="border-radius: 16px;">
                    <div class="card-body p-4 d-flex flex-column">
                        <h5 class="fw-bold mb-4 text-dark"><i class="bi bi-pie-chart text-primary"></i> Tỷ lệ đơn hàng</h5>
                        <div style="position: relative; height: 220px; margin: auto 0;">
                            <canvas id="orderChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script th:inline="none">
            // Đảm bảo DOM load xong mới vẽ biểu đồ
            document.addEventListener('DOMContentLoaded', function() {
                // Biểu đồ Doanh thu (Dữ liệu mô phỏng để báo cáo sinh động hơn)
                const ctxRev = document.getElementById('revenueChart').getContext('2d');
                new Chart(ctxRev, {
                    type: 'line',
                    data: {
                        labels: ['T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'CN'],
                        datasets: [{
                            label: 'Doanh thu (VNĐ)',
                            data: [1500000, 2300000, 1800000, 3200000, 2900000, 4500000, 5200000],
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.15)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.4,
                            pointBackgroundColor: '#10b981',
                            pointRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { beginAtZero: true }
                        }
                    }
                });

                // Biểu đồ Đơn hàng
                const ctxOrd = document.getElementById('orderChart').getContext('2d');
                new Chart(ctxOrd, {
                    type: 'doughnut',
                    data: {
                        labels: ['Thành công', 'Đang xử lý', 'Đã hủy'],
                        datasets: [{
                            data: [75, 20, 5],
                            backgroundColor: ['#10b981', '#f59e0b', '#ef4444'],
                            borderWidth: 0,
                            hoverOffset: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        cutout: '75%',
                        plugins: { 
                            legend: { 
                                position: 'bottom',
                                labels: { padding: 20, usePointStyle: true }
                            } 
                        }
                    }
                });
            });
        </script>
    </section>
</html>
