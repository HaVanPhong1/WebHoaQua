<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="adminLayout(pageTitle)">
<head>
    <meta charset="UTF-8" />
    <title th:text="${pageTitle}">FruitShop Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
    <link rel="stylesheet" th:href="@{/css/admin.css}" />
</head>
<body>
<div class="admin-shell">
    <nav class="sidebar">
        <div class="sidebar-brand">
            <a th:href="@{/admin/dashboard}">
                <i class="bi bi-shop"></i> FruitShop
            </a>
            <small class="d-block text-white-50 mt-1" style="font-size: 0.7rem; letter-spacing: 0.1em;">BẢNG ĐIỀU KHIỂN</small>
        </div>

        <div class="nav-group">
            <div class="nav-label">Tổng quan</div>
            <a th:href="@{/admin/reports}" th:classappend="${pageTitle == 'Báo cáo thống kê' ? 'active' : ''}">
                <i class="bi bi-bar-chart-line-fill"></i> Báo cáo & Thống kê
            </a>
        </div>

        <div class="nav-group">
            <div class="nav-label">Sản phẩm</div>
            <a th:href="@{/admin/categories}" th:classappend="${pageTitle == 'Danh mục' ? 'active' : ''}">
                <i class="bi bi-tags-fill"></i> Danh mục
            </a>
            <a th:href="@{/admin/products}" th:classappend="${pageTitle == 'Sản phẩm' ? 'active' : ''}">
                <i class="bi bi-box-seam-fill"></i> Sản phẩm
            </a>
        </div>

        <div class="nav-group">
            <div class="nav-label">Bán hàng</div>
            <a th:href="@{/admin/orders}" th:classappend="${pageTitle == 'Đơn hàng' ? 'active' : ''}">
                <i class="bi bi-receipt-cutoff"></i> Đơn hàng
            </a>
            <a th:href="@{/admin/customers}" th:classappend="${pageTitle == 'Khách hàng' ? 'active' : ''}">
                <i class="bi bi-people-fill"></i> Khách hàng
            </a>
        </div>

        <div class="nav-group">
            <div class="nav-label">Hệ thống</div>
            <a th:href="@{/admin/accounts}" th:classappend="${pageTitle == 'Tài khoản' ? 'active' : ''}">
                <i class="bi bi-person-lock"></i> Tài khoản
            </a>
        </div>

        <div class="sidebar-footer">
            <a th:href="@{/shop}" class="btn-store-link">
                <i class="bi bi-storefront"></i> Xem cửa hàng
            </a>
            <a class="btn btn-logout btn-sm" th:href="@{/logout}">
                <i class="bi bi-box-arrow-left"></i> Đăng xuất
            </a>
        </div>
    </nav>
    <div class="content-wrapper">
        <header class="topbar">
            <div class="topbar-title">
                <h2 th:text="${pageTitle}">Trang quản trị</h2>
                <p class="text-muted mb-0">Quản lý sản phẩm, đơn hàng, khách hàng và báo cáo.</p>
            </div>
        </header>
        <main class="content p-4">
            <div th:replace="~{::section}"></div>
        </main>
    </div>
</div>
</body>
</html>
