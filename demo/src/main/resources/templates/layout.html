<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="adminLayout(pageTitle)">
<head>
    <meta charset="UTF-8" />
    <title th:text="${pageTitle}">FruitShop Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" th:href="@{/css/admin.css}" />
</head>
<body>
<div class="admin-shell">
    <nav class="sidebar">
        <div class="sidebar-brand mb-4">
            <a th:href="@{/admin/dashboard}">FruitShop Admin</a>
        </div>
        <div class="nav-group">
            <div class="nav-label">Quản lý</div>
            <a th:href="@{/admin/dashboard}">Dashboard</a>
            <a th:href="@{/admin/products}">Sản phẩm</a>
            <a th:href="@{/admin/categories}">Danh mục</a>
            <a th:href="@{/admin/customers}">Khách hàng</a>
            <a th:href="@{/admin/orders}">Đơn hàng</a>
            <a th:href="@{/admin/accounts}">Tài khoản</a>
            <a th:href="@{/admin/reports}">Báo cáo</a>
        </div>
        <div class="sidebar-footer">
            <a class="btn btn-logout btn-sm" th:href="@{/logout}">Đăng xuất</a>
        </div>
    </nav>
    <div class="content-wrapper">
        <header class="topbar">
            <div class="topbar-title">
                <h2 th:text="${pageTitle}">Trang quản trị</h2>
                <p class="text-muted">Quản lý sản phẩm, đơn hàng, khách hàng và báo cáo.</p>
            </div>
        </header>
        <main class="content p-4">
            <div th:replace="~{::section}"></div>
        </main>
    </div>
</div>
</body>
</html>
