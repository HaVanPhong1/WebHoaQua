<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Đăng ký khách hàng FruitShop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" th:href="@{/css/shop.css}" />
</head>
<body class="shop-login-body">
<div class="card shop-login-panel">
    <div class="mb-4 text-center">
        <div class="shop-login-brand">Đăng ký FruitShop</div>
        <p>Điền thông tin để trở thành khách hàng và nhận ưu đãi từ cửa hàng.</p>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form method="post" th:action="@{/register/save}" th:object="${customer}" class="shop-login-form">
        <div class="mb-3">
            <label class="form-label">Họ và tên</label>
            <input class="form-control" type="text" th:field="*{name}" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input class="form-control" type="email" th:field="*{email}" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Số điện thoại</label>
            <input class="form-control" type="text" th:field="*{phone}" />
        </div>
        <div class="mb-3">
            <label class="form-label">Địa chỉ</label>
            <textarea class="form-control" rows="3" th:field="*{address}"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Tên đăng nhập</label>
            <input class="form-control" type="text" name="username" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Mật khẩu</label>
            <input class="form-control" type="password" name="password" required />
        </div>
        <button class="btn btn-success w-100" type="submit">Gửi đăng ký</button>
    </form>
    <div class="mt-4 text-center text-muted small">Đã có tài khoản? <a th:href="@{/login}">Đăng nhập ngay</a>.</div>
</div>
</body>
</html>
