<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: adminLayout('Sản phẩm')">
    <section>
        <div class="page-actions">
            <a class="btn btn-primary" th:href="@{/admin/products/new}">Thêm sản phẩm</a>
        </div>
        <div class="table-responsive page-section">
            <table class="table table-bordered table-hover align-middle">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Tên</th>
                    <th>Danh mục</th>
                    <th>Giá</th>
                    <th>Tồn kho</th>
                    <th>Ảnh</th>
                    <th class="text-center">Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="product : ${products}">
                    <td th:text="${product.id}"></td>
                    <td th:text="${product.name}"></td>
                    <td th:text="${product.category != null ? product.category.name : 'Không có'}"></td>
                    <td th:text="${product.price}"></td>
                    <td th:text="${product.stock}"></td>
                    <td th:text="${product.image}"></td>
                    <td class="text-center">
                        <a class="btn btn-sm btn-warning me-1" th:href="@{/admin/products/edit/{id}(id=${product.id})}">Sửa</a>
                        <a class="btn btn-sm btn-danger" th:href="@{/admin/products/delete/{id}(id=${product.id})}">Xóa</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</html>
