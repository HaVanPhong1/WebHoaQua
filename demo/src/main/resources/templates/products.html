<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: adminLayout('Sản phẩm')">
    <section>
        <div class="page-actions mb-3">
            <a class="btn btn-primary" th:href="@{/admin/products/new}">Thêm sản phẩm</a>
        </div>

        <!-- Thông báo thành công / lỗi -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-3" role="alert" style="border-radius: 8px;">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show mb-3" role="alert" style="border-radius: 8px;">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="table-responsive page-section">
            <table class="table table-bordered table-hover align-middle">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Tên</th>
                    <th>Danh mục</th>
                    <th>Giá</th>
                    <th>Tồn kho</th>
                    <th>Ảnh</th>
                    <th class="text-center">Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="product : ${products}">
                    <td th:text="${product.id}"></td>
                    <td th:text="${product.name}"></td>
                    <td th:text="${product.category != null ? product.category.name : 'Không có'}"></td>
                    <td th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
                    <td th:text="${product.stock}"></td>
                    <td th:text="${product.image}"></td>
                    <td class="text-center">
                        <a class="btn btn-sm btn-info me-1 btn-clone" th:href="@{/admin/products/clone/{id}(id=${product.id})}" th:data-name="${product.name}">Nhân bản</a>
                        <a class="btn btn-sm btn-warning me-1" th:href="@{/admin/products/edit/{id}(id=${product.id})}">Sửa</a>
                        <a class="btn btn-sm btn-danger btn-delete" th:href="@{/admin/products/delete/{id}(id=${product.id})}" th:data-name="${product.name}">Xóa</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', function() {
                document.querySelectorAll('.btn-delete').forEach(function(btn) {
                    btn.addEventListener('click', function(e) {
                        var name = this.getAttribute('data-name') || 'mục này';
                        if (!confirm('Bạn có chắc chắn muốn xóa "' + name + '" không?\n\nHành động này không thể hoàn tác!')) {
                            e.preventDefault();
                        }
                    });
                });
                document.querySelectorAll('.btn-clone').forEach(function(btn) {
                    btn.addEventListener('click', function(e) {
                        var name = this.getAttribute('data-name') || 'sản phẩm này';
                        if (!confirm('Bạn có chắc chắn muốn nhân bản sản phẩm "' + name + '" không?')) {
                            e.preventDefault();
                        }
                    });
                });
            });
        </script>
    </section>
</html>
